name: Daily Foundry Retirement Monitor

on:
  schedule:
    # 每天 00:30 UTC = 08:30 Asia/Shanghai
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: write   # 提交快照回 main
  pages: write      # 部署到 GitHub Pages
  id-token: write   # GitHub Pages 部署需要

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run daily monitor (fetch + diff + email)
        env:
          MAILER_WEBHOOK_URL: ${{ secrets.MAILER_WEBHOOK_URL }}
          HISTORY_PATH: ../data/history.json
          TZ: Asia/Shanghai
        working-directory: app
        run: |
          mkdir -p ../data
          python daily_job.py

      - name: Build static site
        env:
          HISTORY_PATH: ../data/history.json
          SITE_OUT: site
          TZ: Asia/Shanghai
        working-directory: app
        run: |
          mkdir -p ../site
          SITE_OUT=../site python build_site.py

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore(data): daily snapshot $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
