# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: foundry-retirement-monitor
metadata:
  template: foundry-retirement-monitor@1.0.0
services:
  func:
    project: ./app
    language: python
    host: function
hooks:
  postprovision:
    windows:
      shell: pwsh
      run: |
        Write-Host ""
        Write-Host "✅ Provision 完成。请到 Azure Portal -> Communication Services -> Email Services -> Provision domains，"
        Write-Host "   找到 AzureManagedDomain，复制 MailFrom (DoNotReply@<guid>.azurecomm.net)，"
        Write-Host "   写入 Function App 应用设置 SENDER_ADDRESS（azd env set SENDER_ADDRESS '<value>'），然后 azd deploy。"
    posix:
      shell: sh
      run: |
        echo "✅ Provision 完成。请把 ACS 托管域名的 DoNotReply@<guid>.azurecomm.net 写到 SENDER_ADDRESS。"
