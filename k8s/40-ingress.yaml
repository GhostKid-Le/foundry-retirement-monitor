apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: foundry-monitor
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/health-probe-path: /healthz
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - foundry-monitor.westus2.cloudapp.azure.com
      secretName: web-tls
  rules:
    - host: foundry-monitor.westus2.cloudapp.azure.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
